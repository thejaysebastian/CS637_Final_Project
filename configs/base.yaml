# NOTE: Before experiments, set correct variables below, look at paper and dataset online delete this line after verifying that none of the values below should change. They can be overridden in the individual model config YAML files.

# THESE SHOULD NOT CHANGE ONCE VERIFIED
# However, we can override what needs to be overridden in each model YAML.

# Data
dataset: eurosat

image_size: 64
batch_size: 32
num_workers: 4

# Training
epochs: 50
learning_rate: 0.001
optimizer: adam
weight_decay: 0.0001

# Scheduler - for training from scratch! Optional override in pretrained models
scheduler: step
step_size: 20
gamma: 0.1

# Loss - override to match papers in model YAMLs
criterion: cross_entropy

# System - note seed for reproduceability
device: cuda
seed: 42